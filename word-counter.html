<!DOCTYPE html>
<html>
<head>

<title>Word Counter Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
margin:0;
padding:0;
}

header{
background:#007bff;
color:white;
padding:20px;
font-size:24px;
}

.container{
background:white;
margin:40px auto;
padding:30px;
max-width:600px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

textarea{
width:100%;
height:150px;
padding:10px;
font-size:16px;
}

.result{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<header>
Free Word Counter Tool
</header>

<div class="container">

<h2>Count Words & Characters</h2>

<textarea id="text" placeholder="Type or paste your text here..." oninput="countText()"></textarea>

<div class="result">

<p>Words: <span id="words">0</span></p>

<p>Characters: <span id="characters">0</span></p>

</div>

</div>

<script>

function countText(){

let text = document.getElementById("text").value;

let words = text.trim().split(/\s+/).filter(function(word){
return word.length > 0;
}).length;

let characters = text.length;

document.getElementById("words").innerText = words;

document.getElementById("characters").innerText = characters;

}

</script>

</body>
</html>
