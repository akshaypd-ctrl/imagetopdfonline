<!DOCTYPE html>
<html>
<head>
<title>Free Word Counter Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
text-align:center;
background:#f4f6f9;
padding:20px;
}

textarea{
width:90%;
height:150px;
padding:10px;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
margin-top:10px;
}

.result{
margin-top:20px;
font-size:20px;
}
</style>

</head>

<body>

<h1>Word Counter Tool</h1>

<textarea id="text"></textarea>

<br>

<button onclick="countWords()">Count Words</button>

<div class="result" id="result"></div>

<script>
function countWords(){

let text=document.getElementById("text").value;

let words=text.trim().split(/\s+/).length;

let characters=text.length;

document.getElementById("result").innerHTML =
"Words: "+words+"<br>Characters: "+characters;

}
</script>

<br><br>
<a href="/">Home</a>

</body>
</html>
